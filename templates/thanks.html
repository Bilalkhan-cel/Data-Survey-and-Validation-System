<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --paper: #faf9f6;
            --card: #ffffff;
            --ink: #16181d;
            --muted: #6b7280;
            --accent: #1f6f5c;
            --accent-soft: rgba(31, 111, 92, 0.08);
            --border: #e6e3da;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            color: var(--ink);
            background-color: var(--paper);
            background-image:
                radial-gradient(circle at 1px 1px, rgba(22,24,29,0.05) 1px, transparent 0);
            background-size: 28px 28px;
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 16px;
        }

        .card {
            width: min(560px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(22, 24, 29, 0.07);
            padding: 56px 52px 48px;
            text-align: center;
            animation: cardIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .eyebrow-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .eyebrow-row::before {
            content: "";
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
        }

        .check {
            margin: 32px auto 0;
            display: block;
        }

        .check circle {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-dasharray: 176;
            stroke-dashoffset: 176;
            transform-origin: center;
            animation: drawCircle 0.6s cubic-bezier(0.65, 0, 0.35, 1) 0.15s forwards;
        }

        .check path {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 28;
            stroke-dashoffset: 28;
            animation: drawCheck 0.4s ease 0.65s forwards;
        }

        @keyframes drawCircle {
            to { stroke-dashoffset: 0; }
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        h1 {
            font-family: 'Fraunces', Georgia, serif;
            font-weight: 500;
            font-size: clamp(2.1rem, 4vw, 2.8rem);
            line-height: 1.2;
            letter-spacing: -0.01em;
            margin: 26px 0 14px;
        }

        p.lede {
            margin: 0 auto;
            max-width: 38ch;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.65;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 36px 0 24px;
        }

        .microcopy {
            font-size: 0.85rem;
            color: var(--muted);
        }

        @media (prefers-reduced-motion: reduce) {
            .check circle, .check path {
                animation: none;
                stroke-dashoffset: 0;
            }
            .card { animation: none; }
        }

        @media (max-width: 640px) {
            .card {
                padding: 40px 28px 34px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="eyebrow-row">Founder Insights</div>

            <svg class="check" width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="28"/>
                <path d="M20 33L28 41L44 24"/>
            </svg>

            <h1>Thanks</h1>

            <p class="lede">Your answers help shape tools built for founders like you.</p>

            <div class="divider"></div>

            <span class="microcopy">You can close this tab now.</span>
        </section>
    </main>
</body>
</html>
